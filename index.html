<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --bg: linear-gradient(135deg, #020617, #0f172a);
  --green: #00ff9d;
  --green2: #00ffa6;
  --card: rgba(255,255,255,0.05);
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background: var(--bg);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container {
  max-width:420px;
  width:100%;
}

/* CARD */
.card {
  background: var(--card);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow: 0 0 25px rgba(0,255,157,0.1);
  animation: fadeUp 1s ease;
}

/* IMAGE */
.profile {
  width:120px;
  height:120px;
  border-radius:20px;
  object-fit:cover;
  border:3px solid var(--green);
  box-shadow: 0 0 15px var(--green);
  margin-bottom:10px;
}

/* 🔥 LIVE DOT */
.live-status {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  font-size:13px;
}

.dot {
  width:10px;
  height:10px;
  background:#00ff9d;
  border-radius:50%;
  box-shadow:0 0 10px #00ff9d;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.5); opacity:0.6; }
  100% { transform:scale(1); opacity:1; }
}

/* TITLE */
.title {
  color: var(--green);
  font-weight:700;
  font-size:24px;
}

/* BADGE */
.badge {
  display:inline-block;
  padding:6px 15px;
  background: rgba(0,255,157,0.1);
  border-radius:20px;
  margin:10px 0;
}

/* SMALL BUTTONS */
.small-btns {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.small-btn {
  padding:6px 12px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  font-size:12px;
}

/* COUNTER */
.counter {
  margin-top:12px;
  font-size:14px;
  color:#00ff9d;
  font-weight:600;
  text-shadow:0 0 10px #00ff9d;
}

/* BUTTON */
.main-btn {
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  margin:20px 0;
  padding:15px;
  border-radius:50px;
  background: linear-gradient(90deg, var(--green), var(--green2));
  color:black;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
  box-shadow:0 0 20px rgba(0,255,157,0.4);
}

.main-btn:hover {
  transform:scale(1.05);
}

/* FEATURES */
.feature {
  display:flex;
  align-items:center;
  gap:10px;
  background: var(--card);
  border-radius:15px;
  padding:12px;
  margin:10px 0;
  border:1px solid rgba(0,255,157,0.2);
  transition:0.3s;
}

.feature:hover {
  transform:translateY(-5px);
}

/* CTA */
.cta {
  background: linear-gradient(135deg, #00ff9d, #00c97a);
  color:black;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,255,157,0.5);
}

.cta-btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  border-radius:30px;
  background:white;
  color:black;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.cta-btn:hover {
  transform:scale(1.05);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <!-- IMAGE -->
    <img src="logo.png" class="profile">

    <!-- 🔥 LIVE STATUS -->
    <div class="live-status">
      <div class="dot"></div>
      <span>Live Now</span>
    </div>

    <!-- TITLE -->
    <div class="title">𝙋𝘼𝙉𝙆𝘼𝙅_𝘽𝙃𝘼𝙍𝘿𝙒𝘼𝙅™</div>

    <!-- NAME -->
    <div class="badge">👤 Snow V</div>

    <div>✓ Trusted by thousands of traders</div>

    <div class="small-btns">
      <div class="small-btn">24/7 Updates</div>
      <div class="small-btn">Free to Join</div>
    </div>

    <!-- COUNTER -->
    <div class="counter">
      🔥 <span id="count">1243</span> people joined today
    </div>

  </div>

  <!-- BUTTON -->
  <a href="https://t.me/+q4zZ34pri-pkZDI9" class="main-btn">Join on Telegram</a>

  <!-- FEATURES -->
  <div class="feature">📊 <div>Market Insights & Analysis</div></div>
  <div class="feature">📚 <div>Learn Trading</div></div>
  <div class="feature">⚡ <div>Tips & Tricks</div></div>

  <!-- CTA -->
  <div class="cta">
    ⭐ Stay Ahead with Knowledge ⭐<br>
    Join now and never miss profitable updates 🚀
    <br>
    <a href="https://t.me/+q4zZ34pri-pkZDI9" class="cta-btn">🚀 Join Telegram Channel</a>
  </div>

</div>

<script>
let count = 1243;
setInterval(() => {
  count += Math.floor(Math.random() * 3) + 1;
  document.getElementById("count").innerText = count;
}, 2000);
</script>

</body>
</html>
